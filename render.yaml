databases:
  - name: playto-db
    plan: free

services:
  # 0. Redis (Key Value Store - Free)
  - type: keyvalue
    name: playto-redis
    plan: free

  # 1. Backend + Worker + Beat (Combined as one Web Service - Free)
  - type: web
    name: playto-backend
    env: python
    rootDir: backend
    buildCommand: "./render_build.sh"
    startCommand: "./start_all.sh" # Ek script jo sab kuch start karegi
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: playto-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: playto-redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"

  # 2. Frontend (Static Site - Free)
  - type: web
    name: playto-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://playto-backend.onrender.com/api/v1
