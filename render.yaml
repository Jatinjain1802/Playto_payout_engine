databases:
  - name: playto-db
    plan: free

services:
  - type: redis
    name: playto-redis
    plan: free

  - type: web
    name: playto-backend
    env: python
    rootDir: backend
    buildCommand: "./render_build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromRedis:
          name: playto-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromRedis:
          name: playto-redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"

  - type: worker
    name: playto-worker
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config worker -l info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromRedis:
          name: playto-redis
          property: connectionString

  - type: worker
    name: playto-beat
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config beat -l info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromRedis:
          name: playto-redis
          property: connectionString

  - type: web
    name: playto-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: playto-backend
          property: url
        suffix: /api/v1
