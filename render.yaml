databases:
  - name: playto-db
    plan: free

keyValues:
  - name: playto-redis
    plan: free

services:
  - type: web
    name: playto-backend
    env: python
    rootDir: backend
    buildCommand: "./render_build.sh"
    startCommand: "./start_all.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromKeyValue:
          name: playto-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromKeyValue:
          name: playto-redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"

  - type: web
    name: playto-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://playto-backend.onrender.com/api/v1
