databases:
  - name: playto-db
    plan: free

services:
  # 0. Key Value (Redis-compatible)
  - type: keyvalue
    name: playto-redis
    plan: free
    ipAllowList: []

  # 1. Backend API
  - type: web
    name: playto-backend
    runtime: python
    rootDir: backend
    buildCommand: "./render_build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: playto-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: playto-redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"

  # 2. Worker & Beat
  - type: worker
    name: playto-worker
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config worker -l info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: playto-redis
          property: connectionString

  - type: worker
    name: playto-beat
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config beat -l info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: playto-redis
          property: connectionString

  # 3. Frontend static site
  - type: web
    name: playto-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: playto-backend
          property: url
        suffix: /api/v1
